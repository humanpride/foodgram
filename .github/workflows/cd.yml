name: CD
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'infra/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Copy docker-compose.yml via ssh
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "infra/docker-compose-prod.yml"
          target: "foodgram"

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd foodgram/infra
            sudo docker compose -p foodgram -f docker-compose-prod.yml pull
            sudo docker compose -p foodgram down
            sudo docker compose -p foodgram -f docker-compose-prod.yml up -d
            sudo docker compose -p foodgram exec backend python manage.py migrate
            sudo docker compose -p foodgram exec backend python manage.py collectstatic
            sudo docker compose -p foodgram exec backend cp -r /app/collected_static/. /backend_static/static/
            sudo docker compose -p foodgram exec backend python manage.py import_ingredients

  send_message:
    name: Send Telegram message
    runs-on: ubuntu-latest
    needs: deploy
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          Деплой Foodgram успешно выполнен!
          Автор коммита - ${{ github.actor }}
          Сообщение коммита - ${{ github.event.commits[0].message }}
          Ссылка на коммит - https://github.com/${{github.repository}}/commit/${{github.sha}}
