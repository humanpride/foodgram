name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  sqlite-tests:
    name: Style + Tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: foodgram.settings
      USE_SQLITE: True
      DJANGO_DEBUG: True
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Lint: ruff (check)'
        run: |
          ruff check .
          ruff format --check .

      - name: 'Django: makemigrations check'
        run: |
          python manage.py makemigrations --check --dry-run

      - name: 'Django: migrate'
        run: |
          python manage.py makemigrations
          python manage.py migrate --noinput

      - name: Run tests (pytest)
        run: |
          pytest -q

  postgres-checks:
    name: PostgreSQL integration checks (optional)
    runs-on: ubuntu-latest
    needs: sqlite-tests
    defaults:
      run:
        working-directory: backend
    env:
        DJANGO_SETTINGS_MODULE: foodgram.settings
        POSTGRES_DB: 'test_db'
        POSTGRES_USER: 'test'
        POSTGRES_PASSWORD: 'test_password'
        DB_HOST: 'localhost'
        DB_PORT: 5432
        DATABASE_URL: postgres://test:test_password@localhost:5432/test_db
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: 'test_db'
          POSTGRES_USER: 'test'
          POSTGRES_PASSWORD: 'test_password'
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          pytest -q
