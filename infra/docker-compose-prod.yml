name: foodgram

volumes:
  media:
  pg_data:
  static:

services:
  db:
    container_name: PostgreSQL
    image: postgres:18
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    container_name: backend
    image: trueorfalse8/foodgram_backend
    env_file: .env
    volumes:
      - media:/app/media
      - static:/backend_static
    depends_on:
      db:
        condition: service_healthy
  frontend:
    container_name: frontend
    image: trueorfalse8/foodgram_frontend
    volumes:
      - static:/app/result_build/
  nginx:
    container_name: nginx
    depends_on:
      - frontend
      - backend
    image: nginx:1.25.4-alpine
    ports:
      - "7000:80"
    env_file: .env
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/staticfiles
      - ../docs/:/usr/share/nginx/html/api/docs/
      - media:/user_media
